- name: Install system dependencies
  run: |
    sudo dpkg --add-architecture i386
    sudo apt update -y
    # 仅保留Ubuntu 22.04可用的核心依赖，移除废弃包
    sudo apt install -y \
      build-essential \
      ccache \
      git \
      libncurses5:i386 \
      libstdc++6:i386 \
      libgtk2.0-0:i386 \
      libidn12:i386 \  # 替换废弃的libidn11:i386
      python3-pip \
      python3-setuptools \
      python3-dev \
      zlib1g:i386 \
      openjdk-17-jdk \
      unzip \
      wget \
      gradle
    # Cython通过pip安装（系统apt源无适配包）
    pip install cython
