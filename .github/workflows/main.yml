- name: Install dependencies
  run: |
    python -m pip install --upgrade pip
    pip install buildozer cython  # 新增cython安装
    sudo apt-get update
    sudo apt-get install -y \
      git \
      zip \
      unzip \
      openjdk-17-jdk \
      libncurses5-dev \
      libncursesw5-dev \
      libstdc++6 \
      zlib1g-dev \
      libssl-dev \
      libffi-dev \
      libsqlite3-dev \
      libbz2-dev \
      libreadline-dev \
      liblzma-dev \
      tk-dev
