name: Build AutoCard APK
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
      - name: Install system dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update -y
          sudo apt install -y \
            build-essential \
            ccache \
            git \
            libncurses5:i386 \
            libstdc++6:i386 \
            libgtk2.0-0:i386 \
            libidn12:i386 \
            python3-pip \
            python3-setuptools \
            python3-dev \
            zlib1g:i386 \
            openjdk-17-jdk \
            unzip \
            wget \
            gradle
          pip install cython
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer kivy==2.3.0 kivymd==1.2.0 requests
     - name: Force NDK 25b
  run: |
    # 先创建目标目录（核心修正）
    mkdir -p /home/runner/.buildozer/android/platform/
    # 手动下载并指定NDK 25b
    wget https://dl.google.com/android/repository/android-ndk-r25b-linux.zip -O ndk.zip
    unzip ndk.zip -d /home/runner/.buildozer/android/platform/
    echo "export ANDROIDNDK=/home/runner/.buildozer/android/platform/android-ndk-r25b" >> ~/.bashrc
    source ~/.bashrc
      - name: Build APK
        run: buildozer android debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: autocard-apk
          path: bin/*.apk
